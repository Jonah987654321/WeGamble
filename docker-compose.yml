services:
  # =============
  # DEV PROFILES
  # =============
  nginx-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports: ["${APP_PORT}:80"]
    depends_on: ["php-dev"]
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./src:/var/www/html:ro

  php-dev:
    profiles: ["dev"]
    depends_on: ["mysql"]
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: dev
    entrypoint: ["/usr/local/bin/entrypoint-dev.sh"]
    command: ["php-fpm", "-F"]
    volumes:
      - ./src:/var/www/html
      - ./logs:/var/www/logs
      - ./.env:/var/www/.env:ro
      - vendor_dev:/var/www/html/vendor
      - ./docker/php/entrypoint-dev.sh:/usr/local/bin/entrypoint-dev.sh:ro
    networks:
      default:
        aliases:
          - php-fpm
  
  ws-dev:
    profiles: ["dev"]
    depends_on: ["mysql", "php-dev"]
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: dev
    ports: ["${WS_PORT}:${WS_PORT}"]
    command: ["php", "/var/www/html/webSocket/run.php"]
    volumes:
      - ./src:/var/www/html
      - ./logs:/var/www/logs
      - ./.env:/var/www/.env:ro
      - vendor_dev:/var/www/html/vendor
      - ./docker/php/entrypoint-dev.sh:/usr/local/bin/entrypoint-dev.sh:ro

  # =============
  # PROD PROFILES
  # =============
  nginx:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports: ["${APP_PORT}:80"]
    depends_on: ["php"]

  php:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: prod
    depends_on: ["mysql"]
    volumes:
      - ./logs:/var/www/logs
      - ./.env:/var/www/.env:ro
    networks:
      default:
        aliases:
          - php-fpm
  
  ws:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
      target: prod
    depends_on: ["mysql"]
    command: ["php", "/var/www/html/webSocket/run.php"]
    ports: ["${WS_PORT}:${WS_PORT}"]
    volumes:
      - ./logs:/var/www/logs
      - ./.env:/var/www/.env:ro

  # =============
  # SHARED
  # =============
  mysql:
    profiles: ["dev", "prod"]
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${SQL_DB}
      MYSQL_USER: ${SQL_USER}
      MYSQL_PASSWORD: ${SQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${SQL_ROOT_PASSWORD}
    volumes:
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  vendor_dev:
